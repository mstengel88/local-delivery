# Copy this to `shopify.app.contractor.toml` for your contractor sandbox app.
# Use a DIFFERENT Shopify Partner app than the live Local-Delivery app.

client_id = "b0094fe9ce9d741db6c54bb5ba0d18cc"
name = "Local-Delivery-Contractor"
application_url = "https://contractor.ghstickets.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
scopes = "read_customers,write_customers,read_shipping,write_draft_orders,write_metaobject_definitions,write_metaobjects,write_products,write_shipping"

[auth]
redirect_urls = [
  "https://contractor.ghstickets.com/auth/callback",
  "https://contractor.ghstickets.com/auth/login",
  "https://contractor.ghstickets.com/auth/exit-iframe",
  "https://contractor.ghstickets.com/api/auth/callback"
]
